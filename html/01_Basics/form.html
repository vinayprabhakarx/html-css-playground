<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      form {
        display: table;
        border-spacing: 10px 15px;
      }

      .row {
        display: table-row;
      }

      .row label,
      .row input {
        display: table-cell;
        padding: 5px;
      }

      input[type="submit"] {
        cursor: pointer;
        font-weight: bold;
        background-color: greenyellow;
        padding: 6px 12px;
      }
    </style>
  </head>
  <body>
    <h1>Form Example</h1>

    <form method="GET" autocapitalize="on">
      <div class="row">
        <label for="fname">First Name:</label>
        <input
          type="text"
          id="fname"
          name="fname"
          placeholder="enter your first Name"
          required
        />
      </div>

      <div class="row">
        <label for="lname">Last Name:</label>
        <input
          type="text"
          id="lname"
          name="lname"
          placeholder="enter your last Name"
        />
      </div>

      <div class="row">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          autocomplete="on"
        />
      </div>

      <div class="row">
        <label></label>
        <input type="submit" value="Submit" />
      </div>
    </form>
  </body>
</html>
