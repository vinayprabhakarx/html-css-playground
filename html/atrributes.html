<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attribute in HTML</title>
    <style>
      body {
        background: #1e1e1e;
        color: white;
      }

  </head>

    <h1 style="text-align: center" contenteditable="">Attribute in HTML</h1>

      Lorem ipsum dolor, sit amet consectetur adipisicing elit. Tempore ipsum

      tempora eaque dolorem! Veritatis itaque enim numquam possimus minima
      deleniti.
    </p>
    <p style="text-align: right">Thank You!</p>
  </body>
</html>
